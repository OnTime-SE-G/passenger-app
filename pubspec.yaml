name: passenger_app
description: OnTime - Real-time public transport tracking (Passenger App)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - icon.png
    - splash_image.png
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: icon.png
  adaptive_icon_background: "#2F2F34"
  adaptive_icon_foreground: icon.png
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true
