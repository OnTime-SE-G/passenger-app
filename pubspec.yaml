name: passenger_app
description: OnTime - Real-time public transport tracking (Passenger App)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  mapbox_maps_flutter: ^2.5.0
  http: ^1.2.0
  latlong2: ^0.9.1
  intl: ^0.19.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
